[profile.default]
src = "src"
out = "out"
libs = ["lib", "../../node_modules"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"
